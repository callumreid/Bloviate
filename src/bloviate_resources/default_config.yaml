# Bloviate Configuration

# App Presentation / Logging
app:
  config_version: 6
  verbose_logs: false  # Developer mode: show full startup/runtime internals in terminal output
  suppress_third_party_warnings: true  # Hide noisy library warnings during normal startup
  startup_animation: false  # Show a short ASCII startup animation in interactive terminals
  startup_animation_loops: 1  # Number of animation passes before the app banner
  startup_animation_frame_delay_s: 0.04  # Seconds per animation frame
  startup_animation_step: 2  # Horizontal movement per frame (larger = faster, less smooth)

# Audio Settings
audio:
  sample_rate: 16000
  chunk_size: 1024
  channels: 1
  device_name: ""  # Blank = system default input device; set e.g. "Scarlett" to prefer a specific mic

# Push-to-Talk Settings
ptt:
  hotkey: "<cmd>+<option>"
  secondary_hotkey: "<fn>"  # Optional secondary PTT hotkey
  toggle_hotkey: "<cmd>+<option>+<shift>"  # Toggle dictation on/off without holding keys
  mode_cycle_tap_key: "<cmd>"  # Tap quickly to cycle output cleanup mode
  mode_cycle_tap_count: 3
  mode_cycle_tap_window_ms: 650

# Window Management Settings
window_management:
  enabled: true
  hotkey_prefix: "<ctrl>+<cmd>"  # Base hotkey, combine with arrow keys
  command_hotkey: "<ctrl>+<cmd>"  # Hold to speak window commands
  voice_command_prefixes:
    - "run command"
    - "screen"
    - "window"
    - "desktop"

# Voice Fingerprinting
voice_fingerprint:
  enabled: true
  mode: "whisper"  # whisper (verify) or talk (bypass verification)
  threshold: 0.60  # 0-1, higher = stricter matching (raise to reject cross-talk)
  verify_on_raw_audio: true  # Preserve speaker cues by verifying before denoise
  embedding_model: "speechbrain/spkrec-ecapa-voxceleb"
  min_enrollment_samples: 8  # More enrollment samples improve separation in noisy rooms

# Noise Suppression
noise_suppression:
  enabled: true
  stationary_noise_reduction: 0.7  # 0-1 (aggressive enough for noise, safer for ASR detail)
  vad_aggressiveness: 3  # 0-3, higher = more aggressive
  spectral_gate_threshold: 0.03

# Transcription
transcription:
  provider: "deepgram"  # whisper, deepgram, openai
  model: "medium.en"  # Whisper primary: tiny.en, base.en, small.en, medium.en
  whisper_fallback_model: "medium.en"  # Accuracy-first local fallback
  final_pass: "hybrid"  # hybrid=streaming interim + prerecorded final for best accuracy
  initial_prompt: ""  # Optional base prompt applied to OpenAI + Whisper transcriptions
  include_command_vocabulary: true  # Bias command-mode transcription toward built-in voice commands
  prompt_max_terms: 40  # Keep automatic prompting concise so it helps more than it over-biases
  prompt_max_chars: 600  # Hard cap for generated prompt length
  personal_dictionary_path: "personal_dictionary.yaml"  # Stored in user app data by default
  learned_terms_path: "learned_terms.txt"  # Legacy fallback for old learned-terms files
  final_pass_provider_priority:  # Try providers in this order for final text
    - "openai"
    - "deepgram"
    - "whisper"
  language: "en"
  output_format: "clipboard"  # clipboard, stdout, both
  auto_paste: true  # Paste into the active app after copying transcription to clipboard
  use_custom_dictionary: true  # Apply correction rules from the personal/legacy dictionary

# Local transcript history
history:
  enabled: true  # Text-only local history; raw audio is never stored by default
  max_ui_records: 100

# Post-processing / cleanup
post_processing:
  mode: "verbatim"  # verbatim, clean, coding, message
  openai_enabled: true  # Use AI cleanup when the mode allows it and an OpenAI key is configured
  openai_model: "gpt-4o"
  timeout_s: 12
  temperature: 0.1

# Deepgram (live streaming)
deepgram:
  streaming: true
  model: "nova-3"  # Best accuracy + streaming. Use "flux-general-en" with api_version v2 if Flux is available on your plan.
  api_version: "v1"
  prerecorded_model: "nova-3"  # Accuracy-first final pass model.
  prerecorded_api_version: "v1"
  punctuate: true
  smart_format: true
  interim_results: true
  endpointing: 300  # ms of silence before finalizing
  eot_timeout_ms: 800  # v2 end-of-transcript timeout; uses endpointing if unset.
  no_delay: true
  # Set your API key via environment variable: export DEEPGRAM_API_KEY="your-key"
  api_key_env: "DEEPGRAM_API_KEY"
  finalize_wait_s: 1.0
  connect_timeout_s: 2.0
  prerecorded_timeout_s: 10
  prebuffer_chunks: 50  # ~50 * 64ms = 3.2s of pre-roll (covers async connect time)
  include_dictionary_keyterms: true
  max_keyterms: 100
  keyword_boost: 3.0
  stream_gain:
    enabled: true
    target_rms: 0.035
    noise_floor_rms: 0.0000005
    max_gain_db: 42.0
    min_gain_db: -8.0
    attack: 0.2
    release: 0.5
    peak_ceiling: 0.95
  prerecorded_target_rms: 0.05
  prerecorded_noise_floor_rms: 0.0000005
  prerecorded_max_gain_db: 45.0
  prerecorded_min_gain_db: -8.0
  prerecorded_peak_ceiling: 0.95
  keyterm:
    - "bash"
    - "Claude"
  extra_query_params: {}

# OpenAI speech-to-text (accuracy-first final pass)
openai:
  model: "gpt-4o-transcribe"
  # Set your API key via environment variable: export OPENAI_API_KEY="your-key"
  api_key_env: "OPENAI_API_KEY"
  base_url: "https://api.openai.com/v1"
  timeout_s: 30
  response_format: "json"
  temperature: 0
  prompt: ""

# UI
ui:
  startup_splash:
    enabled: true  # Show native splash card on app startup
    show_cows: true
    duration_ms: 1400
    fade_out_ms: 220
  show_waveform: true
  show_metrics: true
  window_size: [1180, 860]
  theme: "light"
  permissions_prompt:
    enabled: true
  interim_update_interval_s: 0.15
  show_menubar_indicator: true  # Show status in macOS menu bar
  show_main_window: true  # Keep dashboard visible by default for first-run setup
  ptt_overlay:
    enabled: true
    margin: 20  # Distance from bottom of screen
