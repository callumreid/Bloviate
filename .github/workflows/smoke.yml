name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal test dependencies
        run: python -m pip install --upgrade pip numpy pyyaml

      - name: Run bootstrap and CLI smoke tests
        run: python -m unittest discover -s tests
